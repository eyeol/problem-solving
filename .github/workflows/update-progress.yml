name: Update Progress

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * *" # 매일 UTC 00:00 (KST 09:00)
  workflow_dispatch:

concurrency:
  group: update-progress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate SVG & update README
        run: python scripts/generate_svg.py

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/progress.svg README.md data/progress.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update progress [skip ci]"

          for attempt in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}" && \
            git push origin "HEAD:${GITHUB_REF_NAME}" && \
            break

            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after 3 attempts"
              exit 1
            fi

            git rebase --abort || true
            sleep 2
          done
